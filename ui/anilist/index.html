<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniList Browser</title>
  <script type="module" src="./main.ts"></script>
  <style>
    :root {
      --bg: #fff;
      --bg2: #f5f5f5;
      --border: #e0e0e0;
      --text: #111;
      --text2: #555;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --btn-text: #fff;
      --success: #16a34a;
      --error: #dc2626;
      --radius: 6px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    [data-theme="dark"] {
      --bg: #1a1a1a;
      --bg2: #252525;
      --border: #333;
      --text: #f0f0f0;
      --text2: #aaa;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); padding: 12px; }
    #loading, #error { padding: 8px 0; }
    #error { color: var(--error); }
    #loading { color: var(--text2); }
    .grid { display: flex; flex-direction: column; gap: 10px; }
    .card { display: flex; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; }
    .cover { flex-shrink: 0; width: 56px; height: 80px; object-fit: cover; border-radius: 4px; background: var(--border); }
    .cover-placeholder { flex-shrink: 0; width: 56px; height: 80px; border-radius: 4px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 18px; }
    .info { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
    .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .romaji { color: var(--text2); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { color: var(--text2); font-size: 11px; }
    .genres { display: flex; flex-wrap: wrap; gap: 3px; }
    .genre { background: var(--border); color: var(--text2); border-radius: 3px; padding: 1px 5px; font-size: 10px; }
    .overview { color: var(--text2); font-size: 11px; line-height: 1.4; }
    .actions { display: flex; align-items: center; gap: 6px; margin-top: auto; flex-wrap: wrap; }
    .score { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; background: #dcfce7; color: #166534; }
    .score-mid { background: #fef9c3; color: #713f12; }
    .score-low { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .score { background: #14532d; color: #86efac; }
    [data-theme="dark"] .score-mid { background: #422006; color: #fde68a; }
    [data-theme="dark"] .score-low { background: #450a0a; color: #fca5a5; }
    .badge-releasing { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #dbeafe; color: #1e40af; }
    [data-theme="dark"] .badge-releasing { background: #1e3a5f; color: #93c5fd; }
    button.req { background: var(--accent); color: var(--btn-text); border: none; border-radius: var(--radius); padding: 3px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    button.req:hover:not(:disabled) { background: var(--accent-hover); }
    button.req:disabled { opacity: 0.5; cursor: default; }
    .req-ok { color: var(--success); font-size: 11px; }
    .req-err { color: var(--error); font-size: 11px; }
    #sort-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .sort-label { color: var(--text2); font-size: 11px; }
    button.sort-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 2px 8px; cursor: pointer; font-size: 11px; color: var(--text2); }
    button.sort-btn:hover { background: var(--border); }
    button.sort-btn.active { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }
    #footer { margin-top: 12px; text-align: center; }
    #load-more { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 16px; cursor: pointer; font-size: 12px; }
    #load-more:hover { background: var(--border); }
    #load-more:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body></body>
</html>
