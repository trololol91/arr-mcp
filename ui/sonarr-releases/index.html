<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonarr Release Browser</title>
  <script type="module" src="./main.ts"></script>
  <style>
    :root {
      --bg: #fff;
      --bg2: #f5f5f5;
      --border: #e0e0e0;
      --text: #111;
      --text2: #555;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --btn-text: #fff;
      --success: #16a34a;
      --error: #dc2626;
      --radius: 6px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    [data-theme="dark"] {
      --bg: #1a1a1a;
      --bg2: #252525;
      --border: #333;
      --text: #f0f0f0;
      --text2: #aaa;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); padding: 12px; }
    #loading { color: var(--text2); padding: 8px 0; }
    #error { color: var(--error); padding: 8px 0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg2); color: var(--text2); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
    td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg2); }
    .title { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .muted { color: var(--text2); }
    .proto-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .proto-torrent { background: #fef9c3; color: #713f12; }
    .proto-usenet { background: #dbeafe; color: #1e40af; }
    [data-theme="dark"] .proto-torrent { background: #422006; color: #fde68a; }
    [data-theme="dark"] .proto-usenet { background: #1e3a5f; color: #93c5fd; }
    button.grab { background: var(--accent); color: var(--btn-text); border: none; border-radius: var(--radius); padding: 4px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    button.grab:hover:not(:disabled) { background: var(--accent-hover); }
    button.grab:disabled { opacity: 0.5; cursor: default; }
    .grab-ok { color: var(--success); font-size: 12px; }
    .grab-err { color: var(--error); font-size: 12px; }
    #count { color: var(--text2); margin-bottom: 8px; }
  </style>
</head>
<body></body>
</html>
